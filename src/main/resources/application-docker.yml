spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_DB_USER}
    password: ${POSTGRES_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:none}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: redis
      port: 6379
      password: redis_pass_2024
      timeout: 60000ms
    mongodb:
      uri: mongodb://mongo:mongo@mongodb:27017/marketplace_api?authSource=admin
  mail:
    host: mailhog
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  flyway:
    locations: classpath:db/migration/
    baseline-on-migrate: true
    enabled: true
    baseline-description: "init"
    baseline-version: 0
    out-of-order: true

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always

# SpringDoc OpenAPI settings
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# ─── MANAGEMENT / ACTUATOR ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${INSTANCE_ID:local}
  tracing:
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

  # RATE LIMITING
  rate-limit:
    requests-per-minute: 100
    burst-capacity: 200