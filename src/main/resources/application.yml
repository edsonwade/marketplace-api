spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/marketplace_api}
    username: ${POSTGRES_DB_USER:postgres}
    password: ${POSTGRES_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SaasHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      connection-test-query: SELECT 1

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

    # ─── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        generate_statistics: false

  flyway:
    locations: classpath:db/migration/
    baseline-on-migrate: true
    enabled: true
    baseline-description: "init"
    baseline-version: 0
    out-of-order: true
    ignore-migration-patterns: "*:ignored"

  hikari:
    connectionTimeout: 20000
    maximumPoolSize: 5

    # ─── MONGODB ─────────────────────────────────────────────────────────────────
  data:
    mongodb:
      uri: mongodb://${MONGO_USER:mongo_admin}:${MONGO_PASSWORD:mongo_pass_2024}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:saas_audit}?authSource=admin
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass_2024}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms
    # ─── CACHE ───────────────────────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false



  # ─── KAFKA ───────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "code.vanilson.marketplace.*"
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  # ─── MAIL ─────────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 900000 # 15 minutes
      refresh-token:
        expiration: 604800000 # 7 days

# SpringDoc OpenAPI settings
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# ─── MANAGEMENT / ACTUATOR ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${INSTANCE_ID:local}
  tracing:
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

  # RATE LIMITING
  rate-limit:
    requests-per-minute: 100
    burst-capacity: 200

