management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info,metrics"

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace_api
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver


  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
      format_sql: true
      show-sql: true
    database: postgresql


server:
  port: 8081